<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrições</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="header-info">
        <h1>Amostra tec-game</h1>
        <p>Estaremos sediando em Uberlândia...</p>
        <p>Venhar participar</p>
        <h2>Entrada Free</h2>
    </div>

    <nav>
        <a href="evento.html">Inicio</a>
        <a href="atracoes.html">Atrações</a>
        <a href="form.html">Inscreva-se</a>
    </nav>
</header>
    <hr>
    <main>
        <fieldset>
            <legend>
                Garanta sua vaga
            </legend>
             <form action="bemvindo.html">
                <label>*Nome:</label>
                <br>
                <input type="text" required placeholder="Digite seu nome">
                <br>
                <label>*Crie sua senha</label>
                <br>
                <input type="password" required>
                <br>
                <label>*Confirme a sua senha</label>
                <br>
                <input type="password" required>
                <br>
                <label>Idade</label>
                <br>
                <input type="date" required>
                <br>
                <label>Horário de preferência</label>
                <br>
                <label>
                    <input type="radio" name="horario">
                    Manhã
                </label>
                <br>
                <label>
                    <input type="radio" name="horario">
                    Tarde
                </label>
                <br>
                <label>
                    <input type="radio" name="horario">
                    Noite
                </label>
                <br>
                <lab>Evento de interesse:</lab>
                <br>
                <label>
                    <input type="checkbox">
                    Designer de personagens
                </label>
                <br>
                <label>
                    <input type="checkbox">
                    Construção de jogos
                </label>
                <br>
                <label>
                    <input type="checkbox">
                    Todos
                </label>
                <br>
                <label>Qual seu estado?</label>
                <br>
                <select>
                    <option>SP</option>
                    <option>RR</option>
                    <option>AM</option>
                    <option>PA</option>
                </select>
                <br>
                <label>Expectativa</label>
                <label>
                    <input type="range" width="10">
                </label>
                <br>
                <label>Conteme sobre sua esperiencia na área</label>
                <br>
                 <textarea></textarea>
                <br>
                <input type="reset" value="limpar">
                <br>
                <input type="submit" value="enviar">
            </form>

        </fieldset>
    </main>
    <footer>
        <p>Evento será realizado pela Social tec-game</p>
        <p>Conto com a sua pressencia</p>
    </footer>
</body>
</html>
